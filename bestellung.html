<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>MeinBlumenladen</title>
		<meta name="description" content="Bestelle über 500 verschiedenen frische Blumen in meinem kleinen Laden.">
		<link rel="icon" href="icon.png">
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		
		<nav class="social-nav">
			
			<a class="nav-start" href="index.html">Startseite</a>

			<ul class="nav-center">

				
				<li><a href="newsletter.html">📖 Newsletter</a></li>

				<li><a href="kontakt.html">📩 Kontakt</a></li>

				<li><a href="überuns.html">⚙️ Über Uns</a></li>

				<li><a href="https://youtube.com">
				<img src="Bilder/yicon.png" alt="Youtube"></a></li>

				<li><a href="https://instagram.com">
				<img src="Bilder/iicon.png" alt="Instagram"></a></li>

				<li><a href="https://facebook.com">
				<img src="Bilder/ficon.png" alt="Facebook"></a></li>
				
				
			</ul>
		</nav>

	
		<main>	
			<div class="bestell-datenbox">
				<h1>Daten für die Bestellung:</h1>
				<form action="danke.html" method="get">
				<label for="name">Name:</label>
				<br>
				<input id="name" name="name" type="text" required>
				<br>
				<br>
				<label for="email">E-Mail:</label>
				<br>
				<input id="email" name="email" type="email" required>
				<br>
				<br>
				<label for="nachricht">Nachricht:</label>
				<br>
				<textarea id="nachricht" name="nachricht"></textarea>
				<br>
				<br>
				<label for="produkt">Produkt:</label>
				<br>
				<select id="produkt" name="produkt" required>
				<option value="">Bitte wählen...</option>
				<option value="rose">Rose</option>
				<option value="lilie">Lilie</option>
				<option value="orchidee">Orchidee</option>
				</select>
				<br>
				<br>
				<label for="menge">Menge:</label>
				<br>
				<input id="menge" name="menge" type="number" min="1" max="20" value="1">
				<br>
				<br>	
				<button type="submit">Bestellung senden</button>
			</div>
		</main>
	</body>
</html>
